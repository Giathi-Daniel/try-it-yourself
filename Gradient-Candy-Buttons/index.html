<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradient Candy Buttons</title>
     <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
     <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="blob blob1"></div>
    <div class="blob blob2"></div>
    <div class="blob blob3"></div>

    <div class="particles">
        <div class="particle" style="width: 8px; height: 8px; left: 12%; bottom: 10%; animation-duration: 6s; animation-delay: 0s;"></div>
        <div class="particle" style="width: 5px; height: 5px; left: 28%; bottom: 15%; animation-duration: 8s; animation-delay: 1.2s;"></div>
        <div class="particle" style="width: 10px; height: 10px; left: 55%; bottom: 5%; animation-duration: 7s; animation-delay: 0.6s;"></div>
        <div class="particle" style="width: 6px; height: 6px; left: 55%; bottom: 20%; animation-duration: 9s; animation-delay: 2s;"></div>
        <div class="particle" style="width: 7px; height: 7px; left: 85%; bottom: 8%; animation-duration: 6.5s; animation-delay: 0.3s;"></div>
        <div class="particle" style="width: 4px; height: 4px; left: 40%; bottom: 12%; animation-duration: 10s; animation-delay: 1.8s;"></div>
        <div class="particle" style="width: 9px; height: 9px; left: 60%; bottom: 18%; animation-duration: 7.5s; animation-delay: .9s;"></div>
    </div>

    <div class="container">
        <button class="clay-btn btn1">
            <span>Strawberry Cream</span>
            <div class="shimmer"></div>
            <div class="glow-ring"></div>
            <div class="sparkle-dot" style="top:18%;right:22%;animation-delay:0s;"></div>
            <div class="sparkle-dot" style="top:60%;right:36%;animation-delay:1.4s;width:4px;height:4px;"></div>
        </button>

        <button class="clay-btn btn2">
            <span>Blueberry Pop</span>
            <div class="shimmer" style="animation-delay: .8s"></div>
            <div class="glow-ring"></div>
            <div class="sparkle-dot" style="top:22%;right:28%;animation-delay:.6s;"></div>
        </button>

        <button class="clay-btn btn3">
            <span>Mint Bubble</span>
            <div class="shimmer" style="animation-delay: 1.6s;"></div>
            <div class="glow-ring"></div>
            <div class="sparkle-dot" style="top:20%;right:20%;animation-delay:1.2s;"></div>
        </button>

        <button class="clay-btn btn4">
            <span>Lemon Puff</span>
            <div class="shimmer" style="animation-delay: 2.4s;"></div>
            <div class="glow-ring"></div>
            <div class="sparkle-dot" style="top:25%;right:25%;animation-delay:1.8s;"></div>
        </button>

        <button class="clay-btn btn5">
            <span>Lavender Glass</span>
            <div class="shimmer" style="animation-delay: 3.2s;"></div>
            <div class="glow-ring"></div>
            <div class="sparkle-dot" style="top:18%;right:30%;animation-delay: 2.4s;"></div>
            <div class="sparkle-dot" style="top:65%;right:18%;animation-delay: .8s;width:4px;height:4px"></div>
        </button>
    </div>


    
</body>
</html>
